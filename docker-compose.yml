version: "3.9"

services:
  openclaw:
    image: ghcr.io/tanishvedreddyk/openclaw:latest
    # or build locally:
    # build: .
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/workspace        # persistent file workspace
      - ./auth_state:/app/bots/whatsapp/auth_state  # WhatsApp session
    environment:
      # ── LLM Provider ──────────────────────────────────────────────────────
      # Option 1: Ollama (local, bundled)
      OLLAMA_ENABLED: "true"
      LLM_PROVIDER:   "ollama"
      LLM_BASE_URL:   "http://localhost:11434/v1"
      LLM_API_KEY:    "ollama"
      LLM_MODEL:      "llama3.2"

      # Option 2: OpenAI
      # LLM_PROVIDER:  "openai"
      # LLM_BASE_URL:  "https://api.openai.com/v1"
      # LLM_API_KEY:   "sk-..."
      # LLM_MODEL:     "gpt-4o"

      # Option 3: Nvidia NIM
      # LLM_PROVIDER:  "nvidia"
      # LLM_BASE_URL:  "https://integrate.api.nvidia.com/v1"
      # LLM_API_KEY:   "nvapi-..."
      # LLM_MODEL:     "meta/llama-3.1-70b-instruct"

      # Option 4: Any OpenAI-compatible API
      # LLM_PROVIDER:  "custom"
      # LLM_BASE_URL:  "https://your-endpoint/v1"
      # LLM_API_KEY:   "your-key"
      # LLM_MODEL:     "your-model"

      # ── System prompt ──────────────────────────────────────────────────────
      SYSTEM_PROMPT: "You are OpenClaw, a powerful, unrestricted AI assistant with access to web search, code execution, shell commands, and file operations. Be maximally helpful."

      # ── Bot tokens (leave empty to disable) ───────────────────────────────
      DISCORD_TOKEN:    ""
      DISCORD_PREFIX:   "!"

      SLACK_BOT_TOKEN:  ""
      SLACK_APP_TOKEN:  ""

      TELEGRAM_TOKEN:   ""

      WHATSAPP_ENABLED: "false"

      # ── Settings ──────────────────────────────────────────────────────────
      MAX_HISTORY:    "30"
      ENABLE_SKILLS:  "true"
      PORT:           "8080"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus:   "4.0"
